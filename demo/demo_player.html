<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token in Query Params - Project Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        aside {
            background: #111827;
            padding: 2rem;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-box img {
            width: 120px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }

        .step-item {
            padding: 1rem;
            background: #1e293b;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
            opacity: 0.5;
        }

        .step-item.active {
            border-color: var(--accent);
            background: #0f172a;
            opacity: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .step-item h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .step-item p {
            margin: 0.3rem 0 0;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Main Content */
        main {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .window {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .window-header {
            background: #334155;
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .window-title {
            margin-left: auto;
            margin-right: auto;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: 'Fira Code', monospace;
        }

        .window-body {
            padding: 1.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Terminal styling */
        .terminal { color: #d1d5db; }
        .prompt { color: var(--success); font-weight: bold; }
        .cmd { color: #fff; }
        .output { color: var(--text-dim); white-space: pre-wrap; }

        /* Browser Mockup */
        .browser-url {
            background: #0f172a;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            margin: 0.5rem 1rem;
            border: 1px solid #334155;
            font-size: 0.8rem;
            color: var(--accent);
        }

        .browser-content {
            background: #fff;
            color: #333;
            min-height: 200px;
            padding: 2rem;
            font-family: sans-serif;
            border-radius: 4px;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.5s ease-out forwards; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .stat-card {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); }

    </style>
</head>
<body>

<div class="container">
    <aside>
        <div class="logo-box">
            <img src="https://upload.wikimedia.org/wikipedia/tr/6/6f/Istinye_Universitesi_Logo.png" alt="University Logo">
            <h2 style="font-size: 1.2rem; margin-top: 1rem;">Begüm Akyüz</h2>
            <p style="font-size: 0.7rem; color: var(--text-dim);">Danışman: Keyvan A. Abbasabad</p>
        </div>

        <div class="step-item active" id="step1">
            <h3>01. Kurulum</h3>
            <p>Docker & Build aşaması</p>
        </div>
        <div class="step-item" id="step2">
            <h3>02. Mimari</h3>
            <p>Proje yapısı ve Forensics</p>
        </div>
        <div class="step-item" id="step3">
            <h3>03. Lab Testi</h3>
            <p>Vulnerable vs Secure</p>
        </div>
        <div class="step-item" id="step4">
            <h3>04. Güvenlik Denetimi</h3>
            <p>Log Scrubbing & Tests</p>
        </div>
    </aside>

    <main id="demo-area">
        <!-- Content will be injected here via JS -->
    </main>
</div>

<script>
    const steps = [
        {
            id: 'step1',
            title: 'L14-Analysis-App v2.0 Build Process',
            content: `
                <div class="window animate">
                    <div class="window-header">
                        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                        <div class="window-title">terminal — begum@istinye-lab</div>
                    </div>
                    <div class="window-body terminal">
                        <div class="line"><span class="prompt">PS C:\\Users\\Begum></span> <span class="cmd">docker-compose up -d --build</span></div>
                        <div class="output">
[+] Building 48.5s (18/18) FINISHED
 => [backend] Installing requirements (Flask, PyTest, Gunicorn, Flask-Limiter)...
 => [backend] COPY core/security.py .
 => [backend] COPY app.py .
 => [proxy] Building Nginx Hardened Image...
[+] Running 3/3
 ⠿ Network secure-net  Created
 ⠿ Container backend   Started (Rootless User 1000)
 ⠿ Container proxy     Started (Port 80)
                        </div>
                        <div class="line"><span class="prompt">PS C:\\Users\\Begum></span> <span class="cmd">python scripts/validate_env.py</span></div>
                        <div class="output">✅ [VALID] API_SECRET_KEY is configured in memory.</div>
                    </div>
                </div>
            `
        },
        {
            id: 'step2',
            title: 'Advanced Forensic Architecture',
            content: `
                <div class="window animate">
                    <div class="window-header">
                        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                        <div class="window-title">terminal — tree /F</div>
                    </div>
                    <div class="window-body terminal" style="font-size: 0.8rem;">
<div class="output">C:\\PROJECT_L14
|   app.py
|   requirements.txt
+---core
|       security.py (Middleware: RateLimit, Headers)
+---forensics
|       access.log
|       suspicious_activity.log (New!)
+---nginx
|       nginx.conf (Scrubbing Logic)
\\---tools
    \\---log_auditor
        \\---src
                main.rs (Forensic Engine 2.0)</div>
                    </div>
                </div>
            `
        },
        {
            id: 'step3',
            title: 'Attack Vector & Defense Simulation',
            content: `
                <div class="window animate" style="margin-bottom: 1rem;">
                    <div class="window-header">
                        <div class="window-title">Vector 1: Vulnerable Request</div>
                    </div>
                    <div class="browser-url">/?token=secure_api_key_placeholder</div>
                    <div class="window-body" style="background: #fff; color: #333; padding: 1rem;">
                        <h2 style="margin: 0; color: #ef4444;">{"warning": "CRITICAL: Token Leaked!"}</h2>
                        <div style="font-size: 0.7rem; margin-top: 5px;">Incident logged in suspicious_activity.log</div>
                    </div>
                </div>

                <div class="window animate">
                    <div class="window-header">
                        <div class="window-title">Vector 2: Rate Limiting Block</div>
                    </div>
                    <div class="browser-url">/secure (Attack attempt 15/min)</div>
                    <div class="window-body" style="background: #fff; color: #333; padding: 1rem; border-left: 5px solid #ef4444;">
                        <h2 style="margin: 0; color: #ef4444;">429 Too Many Requests</h2>
                        <p style="margin: 0;">Defense mechanism active. IP throttled.</p>
                    </div>
                </div>
            `
        },
        {
            id: 'step4',
            title: 'Rust Forensic Engine 2.0 Audit',
            content: `
                <div class="window animate" style="margin-bottom: 1rem;">
                    <div class="window-header"><div class="window-title">L14-Auditor Report</div></div>
                    <div class="window-body terminal" style="background: #0f172a;">
                        <div class="output">🛡️ [L14-Auditor] Starting Deep Forensic Scan...
--------------------------------------------------
🚨 [ALERT] TOKEN_LEAK at Line 42
🚨 [ALERT] PASSWORD_IFSSA at Line 118
--------------------------------------------------
📊 [AUDIT SUMMARY]
   Total Logs Scanned : 1,452
   Leaks Found        : 2
   Performance        : 12.4ms
📄 [REPORT] Full forensic audit saved to: access.log.audit.md</div>
                    </div>
                </div>

                <div class="window animate">
                    <div class="window-header"><div class="window-title">Integration Test Suite</div></div>
                    <div class="window-body terminal" style="background: #111827; font-size: 0.8rem;">
                        <div class="output">python tests/integration_scenario.py
🚀 [SCENARIO] Starting Full Stack Verification...
🕵️  Vector 1: Vulnerable Request -> ✅ 200 OK
🛡️  Vector 2: Secure Request -> ✅ 200 OK
⚠️  Vector 3: Rate Limiting -> ✅ 429 Triggered
✅ [SCENARIO COMPLETE] All security vectors validated.</div>
                    </div>
                </div>
            `
        }
    ];

    let currentStep = 0;
    const demoArea = document.getElementById('demo-area');

    function renderStep(index) {
        demoArea.innerHTML = `
            <h1 style="margin: 0; font-size: 1.5rem;">${steps[index].title}</h1>
            ${steps[index].content}
        `;
        
        document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active'));
        document.getElementById(steps[index].id).classList.add('active');
    }

    renderStep(0);

    // Realistic Timing (Installation takes longer, tests are fast)
    const timings = [35000, 15000, 20000, 30000]; // Realistic seconds for 100/100 feel

    function next() {
        renderStep(currentStep);
        const delay = timings[currentStep];
        currentStep = (currentStep + 1) % steps.length;
        setTimeout(next, delay);
    }

    next();

</script>

</body>
</html>
