<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token in Query Params - Project Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        aside {
            background: #111827;
            padding: 2rem;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-box img {
            width: 120px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }

        .step-item {
            padding: 1rem;
            background: #1e293b;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
            opacity: 0.5;
        }

        .step-item.active {
            border-color: var(--accent);
            background: #0f172a;
            opacity: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .step-item h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .step-item p {
            margin: 0.3rem 0 0;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Main Content */
        main {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .window {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .window-header {
            background: #334155;
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .window-title {
            margin-left: auto;
            margin-right: auto;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: 'Fira Code', monospace;
        }

        .window-body {
            padding: 1.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Terminal styling */
        .terminal { color: #d1d5db; }
        .prompt { color: var(--success); font-weight: bold; }
        .cmd { color: #fff; }
        .output { color: var(--text-dim); white-space: pre-wrap; }

        /* Browser Mockup */
        .browser-url {
            background: #0f172a;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            margin: 0.5rem 1rem;
            border: 1px solid #334155;
            font-size: 0.8rem;
            color: var(--accent);
        }

        .browser-content {
            background: #fff;
            color: #333;
            min-height: 200px;
            padding: 2rem;
            font-family: sans-serif;
            border-radius: 4px;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.5s ease-out forwards; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .stat-card {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); }

    </style>
</head>
<body>

<div class="container">
    <aside>
        <div class="logo-box">
            <img src="https://upload.wikimedia.org/wikipedia/tr/6/6f/Istinye_Universitesi_Logo.png" alt="University Logo">
            <h2 style="font-size: 1.2rem; margin-top: 1rem;">Begüm Akyüz</h2>
            <p style="font-size: 0.7rem; color: var(--text-dim);">Danışman: Keyvan A. Abbasabad</p>
        </div>

        <div class="step-item active" id="step1">
            <h3>01. Kurulum</h3>
            <p>Docker & Build aşaması</p>
        </div>
        <div class="step-item" id="step2">
            <h3>02. Mimari</h3>
            <p>Proje yapısı ve Forensics</p>
        </div>
        <div class="step-item" id="step3">
            <h3>03. Lab Testi</h3>
            <p>Vulnerable vs Secure</p>
        </div>
        <div class="step-item" id="step4">
            <h3>04. Güvenlik Denetimi</h3>
            <p>Log Scrubbing & Tests</p>
        </div>
    </aside>

    <main id="demo-area">
        <!-- Content will be injected here via JS -->
    </main>
</div>

<script>
    const steps = [
        {
            id: 'step1',
            title: 'Build Process from Scratch',
            content: `
                <div class="window animate">
                    <div class="window-header">
                        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                        <div class="window-title">terminal — begum@istinye-lab</div>
                    </div>
                    <div class="window-body terminal">
                        <div class="line"><span class="prompt">PS C:\\Users\\Begum></span> <span class="cmd">git clone https://github.com/begumakyuz/Token_in_Query_Params.git</span></div>
                        <div class="output">Cloning into 'Token_in_Query_Params'... done.</div>
                        <div class="line"><span class="prompt">PS C:\\Users\\Begum\\Token_in_Query_Params></span> <span class="cmd">docker-compose up -d --build</span></div>
                        <div class="output">
[+] Building 14.2s (12/12) FINISHED
 => [backend internal] load build definition from Dockerfile
 => [backend] FROM python:3.10-slim
 => [backend] RUN useradd -m -u 1000 appuser
 => [backend] RUN pip install --no-cache-dir -r requirements.txt
 => [backend] COPY --chown=appuser:appuser app.py .
 => [proxy internal] load build definition from Dockerfile
 => [proxy] FROM nginx:stable-alpine
[+] Running 3/3
 ⠿ Network secure-net  Created
 ⠿ Container backend   Started
 ⠿ Container proxy     Started
                        </div>
                    </div>
                </div>
            `
        },
        {
            id: 'step2',
            title: 'Project Structure & Forensics',
            content: `
                <div class="window animate">
                    <div class="window-header">
                        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                        <div class="window-title">terminal — tree /F /A</div>
                    </div>
                    <div class="window-body terminal" style="font-size: 0.8rem;">
<div class="output">Folder PATH listing
C:.
|   .env
|   .env.example
|   .gitattributes
|   .gitignore
|   app.py
|   docker-compose.yml
|   Dockerfile
|   LICENSE
|   README.md
|   requirements.txt
|   ROADMAP.md
+---forensics
|       access.log
+---nginx
|       Dockerfile
|       logrotate.conf
|       nginx.conf
+---tests
|       test_app.py
\\---tools
    \\---log_auditor
        |   Cargo.toml
        \\---src
                main.rs</div>
                    </div>
                </div>
            `
        },
        {
            id: 'step3',
            title: 'Interactive Feature Demonstration',
            content: `
                <div class="window animate" style="margin-bottom: 1rem;">
                    <div class="window-header">
                        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                        <div class="window-title">Browser — Vulnerable Endpoint</div>
                    </div>
                    <div class="browser-url">http://localhost/vulnerable/download?token=secure_api_key_placeholder</div>
                    <div class="window-body" style="background: #fff; color: #333; padding: 1rem;">
                        <div style="padding: 10px; border-radius: 4px; background: #fee2e2; color: #991b1b; margin-bottom: 1rem; font-weight: bold;">
                            ⚠️ SECURITY WARNING: Sensitive credential detected in URL!
                        </div>
                        <h2 style="margin: 0;">{"message": "Vulnerable Login Success", "status": "200 OK"}</h2>
                    </div>
                </div>

                <div class="window animate">
                    <div class="window-header">
                        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                        <div class="window-title">Browser — Secure Architecture</div>
                    </div>
                    <div class="browser-url">http://localhost/secure/download <span style="color: var(--text-dim)">(Header: Authorization Bearer ***)</span></div>
                    <div class="window-body" style="background: #fff; color: #333; padding: 1rem;">
                        <div style="padding: 10px; border-radius: 4px; background: #d1fae5; color: #065f46; margin-bottom: 1rem; font-weight: bold;">
                            ✅ COMPLIANT: Authorization hidden in Header.
                        </div>
                        <h2 style="margin: 0;">{"message": "Secure Login Success", "status": "200 OK"}</h2>
                    </div>
                </div>
            `
        },
        {
            id: 'step4',
            title: 'Audit Logs & Test Suite',
            content: `
                <div class="stat-grid animate" style="margin-bottom: 1.5rem;">
                    <div class="stat-card"><div class="stat-val">4/4</div><div class="stat-label">PyTests Passed</div></div>
                    <div class="stat-card" style="border-color: var(--success);"><div class="stat-val" style="color: var(--success);">0</div><div class="stat-label">Unmasked Leaks</div></div>
                    <div class="stat-card"><div class="stat-val">10ms</div><div class="stat-label">Rust Audit Time</div></div>
                </div>

                <div class="window animate" style="margin-bottom: 1rem;">
                    <div class="window-header"><div class="window-title">Nginx scrubbing log</div></div>
                    <div class="window-body terminal" style="background: #111827;">
                        <div class="output">172.18.0.1 - - [07/Apr/2026:01:03:00] "GET /vulnerable?token=<span style="color:var(--warning)">***</span> HTTP/1.1" 200
172.18.0.1 - - [07/Apr/2026:01:03:05] "GET /secure HTTP/1.1" 200</div>
                    </div>
                </div>

                <div class="window animate">
                    <div class="window-header"><div class="window-title">cargo test (Rust Log Auditor)</div></div>
                    <div class="window-body terminal" style="background: #111827; font-size: 0.8rem;">
                        <div class="output">running 4 tests
test tests::test_masked_line ... ok
test tests::test_vulnerable_line ... ok
test tests::test_no_token_line ... ok
test tests::test_partial_token_string ... ok

test result: ok. 4 passed; 0 failed;</div>
                    </div>
                </div>
            `
        }
    ];

    let currentStep = 0;
    const demoArea = document.getElementById('demo-area');

    function renderStep(index) {
        demoArea.innerHTML = `
            <h1 style="margin: 0; font-size: 1.5rem;">${steps[index].title}</h1>
            ${steps[index].content}
        `;
        
        document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active'));
        document.getElementById(steps[index].id).classList.add('active');
    }

    renderStep(0);

    // Auto-advance for recording
    setInterval(() => {
        currentStep = (currentStep + 1) % steps.length;
        renderStep(currentStep);
    }, 12000); // 12 seconds per step (~50s total loop)

</script>

</body>
</html>
