events {
    worker_connections 1024;
}

http {
    # Custom Log Format for Scrubbing
    log_format scrubbed '$remote_addr - $remote_user [$time_local] '
                        '"$request_uri_scrubbed" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';

    # URL Stripping: Mask secret tokens in access logs
    # secret_token yerine ne yazarsa çıksın *** yap
    map $request_uri $request_uri_scrubbed {
        ~^(.*)token=[^&]*(.*)$ $1token=***$2;
        default $request_uri;
    }

    # Custom log'u aktif et
    access_log /var/log/nginx/access.log scrubbed;

    server {
        listen 80;

        # 1. Zafiyetli (Vulnerable) Endpoint Yönlendirmesi (Doğrudan Geçiş)
        location /vulnerable/download {
            proxy_pass http://backend:3000/vulnerable/download;
            proxy_set_header Host $host;
        }

        # 2. Güvenli (Secure) Endpoint Yönlendirmesi (Token Stripping)
        location /secure/download {
            set $auth_header $http_authorization; 
            
            # Eğer query param olarak token gelirse URL'den al Header'a koy
            if ($arg_token) {
                set $auth_header "Bearer $arg_token";
            }

            # İsteği Node.js'e Header ile yolla 
            proxy_set_header Authorization $auth_header;
            proxy_set_header Host $host;
            
            # Parametreyi sıfırla (Header tabanlı yönlendirme) Args kısmını temizlemiyoruz çünkü proxy_pass temiz string ile gidiyor.
            proxy_pass http://backend:3000/secure/download;
        }
    }
}
