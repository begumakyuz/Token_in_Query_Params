version: '3.8'

services:
  backend:
    build: 
      context: .
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - secure-net

  proxy:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - secure-net

networks:
  secure-net:
    driver: bridge
